<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="author" content="Pawan Bhatia">
    <title>Gift Box Open and Message</title>
    <style>
        /* Full screen styling */
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f4f4f4;
        }

        /* Gift box styling */
        .gift-box {
            width: 200px;
            height: 200px;
            background-color: #FFD700;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            cursor: pointer;
            font-size: 80px;
            color: white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }
		 .gift-box1 {
            width: 200px;
            height: 100px;
            background-color: #FFD700;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 0px;
            cursor: pointer;
            font-size: 80px;
            color: white;
            
            position: relative;
            overflow: hidden;
        }

        /* The lid of the gift box (hidden top half) */
        .gift-lid {
            width: 100%;
            height: 50%;
            background-color: #FFD700;
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: bottom;
            transition: transform 1s ease-in-out;
        }
		.only-lid{
        padding-top:95px;
        }

        /* Hidden message that will appear */
        .hidden-message {
            display: none;
            font-size: 24px;
            color: #2C3E50;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1s forwards;
        }

        /* Animation for the message */
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Lid opening animation */
        @keyframes openLid {
            0% {
                transform: translateY(0); /* Lid at the start, closed */
            }
            100% {
                transform: translateY(-100%); /* Lid moves upwards */
            }
        }

    </style>
<script>
        function openGift() {
            var giftLid = document.getElementById("gift-lid");
            var message = document.getElementById("message");
			
            // Start the lid opening animation
            giftLid.style.animation = "openLid 1s forwards"; 

            // After the lid opens, show the message
            setTimeout(function() {
                message.style.display = "block"; // Make the message visible
                message.style.animation = "fadeInUp 1s forwards"; 
				// Trigger the fade-in effect
				
            }, 1000); // Delay to ensure the lid "opens" before the message appears
        }
    </script>
</head>
<body>
    <div class="gift-box" id="gift-box" onclick="openGift()">
	<div class="gift-lid">
        <div class="gift-lid" id="gift-lid"><div class="gift-box1"><span class='only-lid'>🎁</span>
		</div><div id="message" class="hidden-message">
        April Fool 🤪
    </div></div></div>
        🎁
    </div>
</body>
</html>
